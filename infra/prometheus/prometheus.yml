global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'spring-blue'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend-blue:8080']

  - job_name: 'spring-green'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend-green:8082']